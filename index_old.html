<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />

    <style>
      #banner {
        background-color: #1e234b;
      }
      #banner h3 {
        color: #fff;
      }
      #link {
        min-height: 100vh;
        background-color: #f9f9f9;
        background-image: linear-gradient(
            rgba(60, 38, 38, 0),
            rgba(32, 29, 29, 0.7),
            rgba(38, 6, 6, 0.5)
          ),
          url("./images/comingsoon.jpg");
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
      }

      .btn {
        padding: 0.25rem 1.3rem;
        font-size: 1.3rem;
        line-height: 1.5;
        border-radius: 0.2rem;
        color: #fff !important;
      }
      .btn {
        background-color: #e52384 !important;
        border-color: #e52384 !important;
      }
      .btn:hover,
      .btn:active,
      a:active,
      .btn:focus,
      a:focus {
        opacity: 0.8;
        background-color: #e52384 !important;
        border-color: #e52384 !important;
      }
    </style>

    <title>Clarkson Group</title>
  </head>
  <body>
    <section id="link" class="d-flex justify-content-center align-items-center">
      <h1 class="text-white">Our Website Is Coming Soon</h1>
    </section>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script
      src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
      integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
